name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: containr-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: containr-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: containr-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Prepare release bundle
        run: |
          bundle_dir="dist/${{ matrix.artifact_name }}"
          archive_path="dist/${{ matrix.artifact_name }}.tar.gz"
          mkdir -p "${bundle_dir}"
          cp target/${{ matrix.target }}/release/containr "${bundle_dir}/containr"
          cp README.md CHANGELOG.md LICENSE "${bundle_dir}/"
          cp -R themes "${bundle_dir}/themes"
          cp -R docs "${bundle_dir}/docs"
          cp -R packaging "${bundle_dir}/packaging"
          tar -C dist -czf "${archive_path}" "${{ matrix.artifact_name }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: .github/release-notes/v0.5.0.md
          files: dist/**/*
